version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "millipress/*"
    ignore:
      - dependency-name: "millipress/millirules"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "pestphp/pest"
        versions: [">=5.0"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
