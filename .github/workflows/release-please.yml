name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

  dist:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      SLUG: millibase
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Create dist
        run: |
          # build/ is tracked, so git archive includes it automatically
          git archive HEAD --prefix="${SLUG}/" --output="${SLUG}.tar.gz"
          mkdir dist && tar -xzf "${SLUG}.tar.gz" -C dist
          rm "${SLUG}.tar.gz"

          # Create release zip
          cd dist && zip -r "../${SLUG}.zip" "${SLUG}/"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: gh release upload "$TAG_NAME" "${SLUG}.zip" --clobber
